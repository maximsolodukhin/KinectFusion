name: kinectfusion

services:
  dev:
    build:
      context: .
      target: dev
    image: kinectfusion-dev
    container_name: kinectfusion-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        set -e
        ./scripts/fetch_tum_freiburg1_xyz.sh
        exec sleep infinity

  kinectfusion:
    build:
      context: .
    image: kinectfusion
